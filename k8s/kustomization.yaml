apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: base-chart
    repo: oci://us-west1-docker.pkg.dev/rj-iplanrio-dia/charts
    version: 2.2.3
    releaseName: civitas-landing
    namespace: landing-page
    valuesInline:

      image:
        repository: ghcr.io/prefeitura-rio/civitas-landing
        tag: prod
        pullPolicy: Always
      
      healthCheck:
        path: /

      service:
        port: 80
        containerPort: 8080

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
          
      istio:
        enabled: true
        sidecar:
          proxyMemory: 128Mi
          proxyMemoryLimit: 256Mi
        virtualService:
          hosts:
            - civitas.rio
          timeout: 120s

      autoscaling:
        enabled: false

      podDisruptionBudget:
        enabled: false
        
      argoImageUpdater:
        enabled: true
        updateStrategy: "digest"
