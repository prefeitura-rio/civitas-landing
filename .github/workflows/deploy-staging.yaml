name: Deploy Docker image to Staging

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - css/**
      - fonts/**
      - images/**
      - js/**
      - favicon.ico
      - index.html
      - styles.html
      - nginx.conf
      - Dockerfile
      - k8s/**

jobs:
  build:
    name: Build Docker image for Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Build and push Docker image for Staging
        uses: ./.github/actions/docker-build
        with:
          working-directory: .
          image-tag: staging
          github-token: ${{ secrets.GITHUB_TOKEN }}